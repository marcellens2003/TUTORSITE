<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <title>Tutor Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; }
        html, body { max-width: 100%; overflow-x: hidden; }
        img { max-width: 100%; }
        body {
            margin: 0; min-height: 100vh; font-family: 'Rubik', Arial, sans-serif;
            background: #0a1f5c;
            display: flex; align-items: center; justify-content: center;
            padding: 20px; position: relative;
        }
        body::before {
            content: ''; position: fixed; inset: 0; z-index: -2;
            background-image: url("books-bg-blur.jpg");
            background-size: cover; background-position: center;
            transform: scale(1.04);
        }
        body::after {
            content: ''; position: fixed; inset: 0; z-index: -1;
            background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(10,31,92,0.22));
        }
        .login-container {
            width: 100%; max-width: 440px;
            background: rgba(255,255,255,0.98);
            padding: 30px; border-radius: 14px;
            box-shadow: 0 18px 50px rgba(5,16,48,0.45);
            border: 1px solid rgba(255,255,255,0.6);
            position: relative; z-index: 1;
        }
        @media (min-width: 769px) and (hover: hover) {
            .login-container { background: rgba(255,255,255,0.97); backdrop-filter: blur(2px); }
        }
        .header {
            position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: space-between;
            gap: 12px; margin: -30px -30px 24px; padding: 18px 22px;
            background:
                radial-gradient(80% 120% at 90% -20%, rgba(255,211,77,0.20), rgba(255,211,77,0) 55%),
                linear-gradient(135deg, #08183f 0%, #102a72 45%, #1d3a8f 82%, #244aa6 100%);
            border-radius: 14px 14px 0 0;
            box-shadow: inset 0 0 0 1px rgba(255,211,77,0.22), inset 0 1px 0 rgba(255,255,255,0.18);
        }
        .header::before {
            content: ""; position: absolute; left: 0; right: 0; top: 0; height: 4px;
            background: linear-gradient(90deg, #e8b500 0%, #ffd34d 50%, #e8b500 100%);
        }
        .header::after {
            content: ""; position: absolute; left: 0; right: 0; bottom: 0; height: 4px;
            background: linear-gradient(90deg,
                #d4362a 0%, #d4362a 18%, #e8b500 18%, #ffd34d 50%, #e8b500 82%, #d4362a 82%, #d4362a 100%);
        }
        .header h2 {
            margin: 0; flex-grow: 1; text-align: center; font-size: 19px;
            font-weight: 800; letter-spacing: 0.8px; color: #ffffff;
            text-shadow: 0 1px 3px rgba(0,0,0,0.35);
        }
        .header h2::after {
            content: ""; display:block; width:60px; height:3px; margin:7px auto 0;
            background: linear-gradient(90deg, rgba(232,181,0,0), #ffd34d, rgba(232,181,0,0));
            border-radius:3px;
        }
        .logo { flex-shrink: 0; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.45)); }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: bold; color: #444; }
        .form-group input {
            width: 100%; padding: 12px; font-size: 15px;
            border: 1px solid #ccc; border-radius: 6px; outline: none; transition: border 0.3s;
        }
        .form-group input:focus { border-color: #1d3a8f; }
        .hint { font-size: 12px; color: #666; margin-top: 4px; }
        .pw-wrap { position: relative; }
        .pw-wrap input { padding-right: 70px; }
        .pw-toggle {
            position: absolute; top: 50%; right: 8px; transform: translateY(-50%);
            background: transparent; border: none; cursor: pointer;
            font-size: 13px; font-weight: bold; color: #1d3a8f;
            padding: 4px 8px; border-radius: 4px; line-height: 1;
        }
        .pw-toggle:hover { background: #eef3fb; }
        .pw-toggle:focus { outline: 2px solid #1d3a8f; outline-offset: 1px; }
        .primary-btn {
            width: 100%; padding: 12px; border: none;
            border-radius: 6px; font-size: 16px; font-weight: bold;
            cursor: pointer; margin-top: 10px; transition: background 0.3s;
            background: linear-gradient(135deg, #102a72, #1d3a8f); color: #fff;
        }
        .primary-btn:hover { background: linear-gradient(135deg, #0a1f5c, #14307f); }
        .primary-btn:disabled { background: #9ec5e8; cursor: not-allowed; }
        .error-message {
            color: #721c24; font-size: 14px; margin-top: 5px; display: none;
            text-align: center; padding: 8px; background-color: #f8d7da;
            border-radius: 4px; border: 1px solid #f5c6cb;
        }
        .success-message {
            color: #155724; font-size: 14px; margin-top: 5px; display: none;
            text-align: center; padding: 8px; background-color: #d4edda;
            border-radius: 4px; border: 1px solid #c3e6cb;
        }
        .loading { display: none; text-align: center; margin-top: 10px; }
        .loading-spinner {
            border: 3px solid #f3f3f3; border-top: 3px solid #1d3a8f;
            border-radius: 50%; width: 20px; height: 20px;
            animation: spin 1s linear infinite; display: inline-block; vertical-align: middle;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media (max-width: 768px) {
            .login-container { padding: 22px 18px; }
            .header { margin: -22px -18px 22px; padding: 16px 16px; }
            .header h2 { font-size: 17px; }
            .logo { height: 48px; width: 48px; }
            .form-group input { font-size: 16px; }
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="header">
        <img src="CoDE LOGO PNG.png" height="60" width="60" class="logo"
             onerror="this.src='https://via.placeholder.com/60/002147/FFFFFF?text=CoDE'">
        <h2>Tutor Claim Summary Login</h2>
        <img src="UCC LOGO PNG.png" height="60" width="60" class="logo"
             onerror="this.src='https://via.placeholder.com/60/0056b3/FFFFFF?text=UCC'">
    </div>

    <div class="form-group">
        <label for="staffId">Staff ID</label>
        <input type="text" id="staffId" placeholder="e.g. PGT0420"
               autocomplete="username" autocapitalize="characters" spellcheck="false">
        <div class="hint">Enter your CoDE facilitator Staff ID.</div>
    </div>

    <div class="form-group">
        <label for="password">Password</label>
        <div class="pw-wrap">
            <input type="password" id="password" placeholder="Your password"
                   autocomplete="current-password">
            <button type="button" class="pw-toggle" id="pwToggle"
                    aria-label="Show password" aria-pressed="false">Show</button>
        </div>
    </div>

    <div id="loginError" class="error-message"></div>
    <div id="loginSuccess" class="success-message">Signed in! Redirecting...</div>
    <div id="loginLoading" class="loading">
        <div class="loading-spinner"></div>
        <span style="margin-left: 8px;">Signing in...</span>
    </div>

    <button type="button" class="primary-btn" id="loginBtn">Sign in</button>
</div>

<script type="module">
    import { initializeApp }
        from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import {
        getAuth, signInWithEmailAndPassword, signOut,
        onAuthStateChanged, setPersistence, browserSessionPersistence
    } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
    import {
        getFirestore, doc, getDoc
    } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCzgOGc51Qr6DXnJ-zkczBtGniYNLf0jOw",
        authDomain: "monitoringucc.firebaseapp.com",
        projectId: "monitoringucc",
        storageBucket: "monitoringucc.firebasestorage.app",
        messagingSenderId: "210063574932",
        appId: "1:210063574932:web:8ccd563312321dcd2af181"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    setPersistence(auth, browserSessionPersistence);

    // Tutor directory now lives in Firestore (collection: tutors, doc id = Staff ID)
    // instead of being hardcoded here. See doLogin() below.

    // Firebase needs an email-shaped login, so each Staff ID maps to a
    // synthetic address. Keep this identical wherever accounts are created.
    const DOMAIN = 'tutors.ucc.local';
    function staffIdToEmail(s) {
        const slug = s.trim().toLowerCase()
                       .replace(/[^a-z0-9]+/g, '-')
                       .replace(/^-+|-+$/g, '');
        return slug + '@' + DOMAIN;
    }

    onAuthStateChanged(auth, (user) => {
        if (user && sessionStorage.getItem('tutorStaffId')) {
            window.location.href = 'tutor-report.html';
        }
    });

    function showError(message) {
        const el = document.getElementById('loginError');
        el.textContent = message; el.style.display = 'block';
    }
    function clearMessages() {
        document.getElementById('loginError').style.display = 'none';
        document.getElementById('loginSuccess').style.display = 'none';
    }
    function setLoading(isLoading) {
        document.getElementById('loginLoading').style.display = isLoading ? 'block' : 'none';
        document.getElementById('loginBtn').disabled = isLoading;
    }

    async function doLogin() {
        clearMessages();
        const rawStaffId = document.getElementById('staffId').value.trim().toUpperCase();
        const password = document.getElementById('password').value;
        if (!rawStaffId) { showError('Please enter your Staff ID.'); return; }
        if (!password)   { showError('Please enter your password.'); return; }

        setLoading(true);
        try {
            const email = staffIdToEmail(rawStaffId);
            const cred = await signInWithEmailAndPassword(auth, email, password);

            // Password is correct — now confirm this Staff ID has a tutor
            // record in Firestore and that it's linked to this signed-in
            // account, then pull the display name from it.
            let tutorName = rawStaffId;
            try {
                const snap = await getDoc(doc(db, 'tutors', rawStaffId));
                if (snap.exists()) {
                    const data = snap.data();
                    if (data.uid && data.uid !== cred.user.uid) {
                        // Staff ID belongs to a different account than the one
                        // that just signed in — treat as not found rather than
                        // silently using the wrong tutor's data.
                        throw new Error('STAFF_ID_MISMATCH');
                    }
                    tutorName = data.name || rawStaffId;
                } else {
                    throw new Error('NOT_IN_DIRECTORY');
                }
            } catch (lookupErr) {
                await signOut(auth);
                setLoading(false);
                if (lookupErr.message === 'STAFF_ID_MISMATCH' || lookupErr.message === 'NOT_IN_DIRECTORY') {
                    showError('Staff ID not found in the facilitators list. Contact the administrator.');
                } else {
                    console.error(lookupErr);
                    showError('Could not verify your facilitator record. Check your connection and try again.');
                }
                return;
            }

            sessionStorage.setItem('tutorStaffId', rawStaffId);
            sessionStorage.setItem('tutorName', tutorName);

            setLoading(false);
            document.getElementById('loginSuccess').style.display = 'block';
            setTimeout(() => { window.location.href = 'tutor-report.html'; }, 800);
        } catch (e) {
            console.error(e);
            let msg = 'Could not sign in. Please try again.';
            if (e.code === 'auth/invalid-credential' || e.code === 'auth/wrong-password' ||
                e.code === 'auth/user-not-found' || e.code === 'auth/invalid-email') {
                msg = 'Incorrect Staff ID or password. Please try again, or contact your administrator.';
            } else if (e.code === 'auth/too-many-requests') {
                msg = 'Too many attempts. Please wait a while and try again.';
            } else if (e.code === 'auth/network-request-failed') {
                msg = 'Could not reach the server. Check your connection and try again.';
            } else if (e.code === 'auth/user-disabled') {
                msg = 'This account has been disabled. Contact your administrator.';
            }
            showError(msg); setLoading(false);
        }
    }

    document.getElementById('loginBtn').addEventListener('click', doLogin);

    // Show/hide password — toggle (click to show, click again to hide)
    const pwToggle = document.getElementById('pwToggle');
    const pwField = document.getElementById('password');
    pwToggle.addEventListener('click', () => {
        const showing = pwField.type === 'text';
        pwField.type = showing ? 'password' : 'text';
        pwToggle.textContent = showing ? 'Show' : 'Hide';
        pwToggle.setAttribute('aria-pressed', showing ? 'false' : 'true');
        pwToggle.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
        pwField.focus();
    });
    document.getElementById('staffId').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') document.getElementById('password').focus();
    });
    document.getElementById('password').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') doLogin();
    });
</script>

</body>
</html>
